[mcp_servers.tavily]
command = "bash"
args = ["-lc", "TAVILY_API_KEY=\"${TAVILY_API_KEY:-$(jq -r '.mcpServers.tavily.env.TAVILY_API_KEY // empty' ~/.mcp.json 2>/dev/null)}\"; export TAVILY_API_KEY; exec npx -y tavily-mcp"]

[mcp_servers.exa]
command = "bash"
args = ["-lc", "EXA_API_KEY=\"${EXA_API_KEY:-$(jq -r '.mcpServers.exa.env.EXA_API_KEY // empty' ~/.mcp.json 2>/dev/null)}\"; export EXA_API_KEY; exec npx -y exa-mcp-server"]

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[agents.planner]
description = "복잡한 기능 구현이나 리팩토링을 위한 전문 계획 수립 에이전트."
config_file = "./agents/planner.toml"
nickname_candidates = ["planner", "plan-reviewer"]

[agents.architect]
description = "아키텍처, 모듈 경계, 의존성 방향을 검토하는 설계 에이전트."
config_file = "./agents/architect.toml"
nickname_candidates = ["architect", "pichai"]

[agents.frontend_developer]
description = "프론트엔드 UI, React, 접근성, UX 구현을 담당하는 에이전트."
config_file = "./agents/frontend-developer.toml"
nickname_candidates = ["frontend", "ui-builder"]

[agents.junior_mentor]
description = "초보 개발자가 구현 내용을 이해하도록 쉬운 설명과 학습 문서를 만드는 멘토 에이전트."
config_file = "./agents/junior-mentor.toml"
nickname_candidates = ["junior", "mentor", "junior-mentor"]

[agents.langchain_specialist]
description = "LangChain, LangGraph, Deep Agents 프로젝트의 프레임워크 선택과 구현 전략을 돕는 에이전트."
config_file = "./agents/langchain-specialist.toml"
nickname_candidates = ["langchain", "langgraph", "deep-agents"]

[agents.prd_planner]
description = "제품 아이디어를 CPS, PRD, SPEC, 리스크, 기능 문서로 합성하는 기획 에이전트."
config_file = "./agents/prd-planner.toml"
nickname_candidates = ["prd", "prd-planner", "product-planner"]

[agents.code_reviewer]
description = "변경사항의 버그, 회귀, 보안 위험, 테스트 누락을 찾는 코드 리뷰 에이전트."
config_file = "./agents/code-reviewer.toml"
nickname_candidates = ["reviewer", "code-reviewer"]

[agents.security_reviewer]
description = "보안, 비밀정보, 입력 검증, 의존성 위험을 검토하는 에이전트."
config_file = "./agents/security-reviewer.toml"
nickname_candidates = ["security", "security-reviewer"]

[agents.azure_infra]
description = "Azure CLI 기반 인프라 산정, 리소스 검토, 운영, 모니터링을 담당하는 에이전트."
config_file = "./agents/azure-infra.toml"
nickname_candidates = ["azure", "azure-infra", "azops", "cloudops"]

[agents.qa]
description = "검증, 테스트 시나리오, 사용자 관점 품질 게이트를 담당하는 QA 에이전트."
config_file = "./agents/bezos-qa.toml"
nickname_candidates = ["qa", "bezos"]

[agents.evaluator]
description = "작업 결과를 독립적으로 평가하고 개선 루프를 제안하는 에이전트."
config_file = "./agents/evaluator-musk.toml"
nickname_candidates = ["evaluator", "musk"]

[agents.docs_writer]
description = "변경사항에 맞춰 문서와 인계 내용을 정리하는 에이전트."
config_file = "./agents/docs-writer.toml"
nickname_candidates = ["docs", "docs-writer"]

[agents.docs_maintainer]
description = "코딩 작업 중 생성된 docs/harness 문서를 최신 구현과 동기화하는 에이전트."
config_file = "./agents/docs-maintainer.toml"
nickname_candidates = ["docs-maintainer", "doc-sync"]

[agents.tdd_guide]
description = "테스트 우선 개발과 테스트 설계를 돕는 에이전트."
config_file = "./agents/tdd-guide.toml"
nickname_candidates = ["tdd", "test-guide"]

[agents.stitch_developer]
description = "Stitch 산출물을 React 컴포넌트와 디자인 토큰으로 옮기는 에이전트."
config_file = "./agents/stitch-developer.toml"
nickname_candidates = ["stitch", "stitch-dev"]

[hooks]

[[hooks.SessionStart]]
matcher = "*"
hooks = [
  { type = "command", command = "bash ./hooks/codex-event-log.sh SessionStart", timeout = 5 },
  { type = "command", command = "bash ./hooks/codex-visible-error-reminder.sh", timeout = 5 },
]

[[hooks.UserPromptSubmit]]
matcher = "*"
hooks = [
  { type = "command", command = "bash ./hooks/codex-event-log.sh UserPromptSubmit", timeout = 5 },
  { type = "command", command = "bash ./hooks/codex-git-strategy-log.sh", timeout = 5 },
]

[[hooks.PreToolUse]]
matcher = "*"
hooks = [
  { type = "command", command = "bash ./hooks/codex-event-log.sh PreToolUse", timeout = 5 },
]

[[hooks.PreToolUse]]
matcher = "exec_command"
hooks = [
  { type = "command", command = "bash ./hooks/codex-git-guard.sh", timeout = 5 },
]

[[hooks.PostToolUse]]
matcher = "*"
hooks = [
  { type = "command", command = "bash ./hooks/codex-event-log.sh PostToolUse", timeout = 5 },
  { type = "command", command = "bash ./hooks/codex-major-error-log.sh", timeout = 5 },
  { type = "command", command = "bash ./hooks/codex-docs-sync-log.sh", timeout = 5 },
]

[[hooks.PostToolUse]]
matcher = "exec_command"
hooks = [
  { type = "command", command = "bash ./hooks/codex-commit-log.sh", timeout = 5 },
]

[[hooks.PermissionRequest]]
matcher = "*"
hooks = [
  { type = "command", command = "bash ./hooks/codex-event-log.sh PermissionRequest", timeout = 5 },
]

[[hooks.PreCompact]]
matcher = "*"
hooks = [
  { type = "command", command = "bash ./hooks/codex-event-log.sh PreCompact", timeout = 5 },
]

[[hooks.PostCompact]]
matcher = "*"
hooks = [
  { type = "command", command = "bash ./hooks/codex-event-log.sh PostCompact", timeout = 5 },
  { type = "command", command = "bash ./hooks/codex-visible-error-reminder.sh", timeout = 5 },
]

[[hooks.Stop]]
matcher = "*"
hooks = [
  { type = "command", command = "bash ./hooks/codex-event-log.sh Stop", timeout = 5 },
]
